<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

      <!-- ── START SCREEN ── -->
      <div id="start-screen" class="screen active">
        <div class="screen-card">
          <div class="quiz-icon">🧠</div>
          <h1 class="app-title">JavaScript Quiz</h1>
          <p class="app-subtitle">Test your JS fundamentals knowledge</p>
          <ul class="quiz-meta">
            <li>📋 &nbsp;10 questions</li>
            <li>⏱️ &nbsp;No time limit</li>
            <li>✅ &nbsp;Instant feedback</li>
          </ul>
          <button id="btn-start" class="btn btn-primary">Start Quiz</button>
        </div>
      </div>

      <!-- ── QUESTION SCREEN ── -->
      <div id="question-screen" class="screen">
        <!-- Progress -->
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text" class="progress-text">Question 1 of 10</p>

        <div class="question-card">
          <p id="question-text" class="question-text"></p>

          <!-- Answer options rendered by JS -->
          <ul id="options-list" class="options-list"></ul>

          <!-- Feedback shown after answering -->
          <div id="feedback" class="feedback hidden">
            <p id="feedback-msg" class="feedback-msg"></p>
            <p id="feedback-explain" class="feedback-explain"></p>
          </div>

          <!-- Next / Finish button -->
          <button id="btn-next" class="btn btn-primary hidden">Next →</button>
        </div>
      </div>

      <!-- ── RESULT SCREEN ── -->
      <div id="result-screen" class="screen">
        <div class="screen-card">
          <div id="result-emoji" class="quiz-icon">🏆</div>
          <h2 class="result-title">Quiz Complete!</h2>
          <div class="score-display">
            <span id="score-fraction" class="score-fraction">0/10</span>
            <span id="score-percent" class="score-percent">0%</span>
          </div>
          <p id="result-msg" class="result-msg"></p>

          <!-- Score breakdown -->
          <div class="breakdown">
            <div class="breakdown-item correct-item">
              <span class="bd-num" id="bd-correct">0</span>
              <span class="bd-label">Correct</span>
            </div>
            <div class="breakdown-item wrong-item">
              <span class="bd-num" id="bd-wrong">0</span>
              <span class="bd-label">Wrong</span>
            </div>
          </div>

          <button id="btn-restart" class="btn btn-primary">Play Again</button>
        </div>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
