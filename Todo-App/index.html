<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="app-title">My To-Do List</h1>
        <p class="app-subtitle">Arrays · DOM Rendering · Events</p>
      </header>

      <!-- Task Stats -->
      <div class="stats-bar">
        <span id="stat-total">0 tasks</span>
        <span id="stat-done">0 done</span>
        <span id="stat-remaining">0 remaining</span>
      </div>

      <!-- Add Task Form -->
      <div class="add-task-card">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="120"
          autocomplete="off"
        />
        <button id="btn-add" class="btn btn-add">Add Task</button>
      </div>

      <!-- Error message for empty input -->
      <p id="error-msg" class="error-msg" aria-live="polite"></p>

      <!-- Filter Buttons -->
      <div class="filter-bar">
        <button class="btn-filter active" data-filter="all">All</button>
        <button class="btn-filter" data-filter="active">Active</button>
        <button class="btn-filter" data-filter="completed">Completed</button>
      </div>

      <!-- Task List — rendered by JavaScript -->
      <ul id="task-list" class="task-list"></ul>

      <!-- Clear completed button -->
      <button id="btn-clear-completed" class="btn btn-clear">
        Clear Completed
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
